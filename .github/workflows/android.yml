name: android

# Proves the Kotlin port builds and its cross-plane conformance test passes. The pure-JVM core
# (`:fundamental-core`) carries the engine + the shared golden gate; the host modules
# (`:fundamental-compose`, `:sample`) assemble against the Android SDK. The conformance test consumes
# the SAME golden the Swift/JS gates use, so a golden change re-checks Android parity automatically.
#
# Note: once the Android library/application modules are in `settings.gradle.kts`, every Gradle
# invocation configures them and needs the SDK — hence the SDK setup runs for the whole job.

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
      - 'swift/Tests/FundamentalCoreTests/Fixtures/conformance-golden.json'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
      - 'swift/Tests/FundamentalCoreTests/Fixtures/conformance-golden.json'

jobs:
  build:
    name: build + test (JVM + Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: set up Android SDK
        uses: android-actions/setup-android@v3
      - name: core — engine + cross-plane conformance
        working-directory: android
        run: ./gradlew :fundamental-core:test
      - name: host — assemble Compose adapter + sample app
        working-directory: android
        run: ./gradlew :fundamental-compose:assembleDebug :sample:assembleDebug
