name: android

# Proves the Kotlin port builds and its cross-plane conformance test passes. The pure-JVM modules
# (`:fundamental-core`, `:fundamental-platform`) carry the engine + the shared golden gate and run
# their unit tests on the JVM; the desktop `:lab` compiles on the JVM too (no SDK). The host modules
# (`:fundamental-android`, `:fundamental-compose`, `:sample`) assemble against the Android SDK. The
# conformance test consumes the SAME golden the Swift/JS gates use, so a golden change re-checks
# Android parity automatically.
#
# Note: once the Android library/application modules are in `settings.gradle.kts`, every Gradle
# invocation configures them and needs the SDK — hence the SDK setup runs for the whole job.

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
      - 'swift/Tests/FundamentalCoreTests/Fixtures/conformance-golden.json'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
      - 'swift/Tests/FundamentalCoreTests/Fixtures/conformance-golden.json'

jobs:
  build:
    name: build + test (JVM + Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: set up Android SDK
        uses: android-actions/setup-android@v3
      - name: core — engine + cross-plane conformance
        working-directory: android
        run: ./gradlew :fundamental-core:test :fundamental-platform:test :lab:test
      - name: host — assemble Compose adapter + Android library + sample app
        working-directory: android
        run: ./gradlew :fundamental-android:assembleDebug :fundamental-compose:assembleDebug :sample:assembleDebug
      - name: lab — headless render smoke check (no emulator)
        working-directory: android
        run: |
          ./gradlew :lab:run --args="render lab-out"
          test "$(ls lab-out/*.png | wc -l)" -ge 5 || { echo "lab render produced no PNGs"; exit 1; }

  # On-emulator smoke (#654): install + launch the sample on a real Android emulator and assert no
  # crash. Advisory (continue-on-error) — emulator boots are slow/flaky, so it never blocks a merge —
  # and only on pushes to main (not every PR), since the headless lab render already gates rendering.
  emulator:
    name: emulator smoke (sample app)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: run sample on emulator (API 34)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          working-directory: android
          script: |
            ./gradlew :sample:installDebug
            adb shell am start -n com.fundamental.sample/.MainActivity
            sleep 8
            adb logcat -d AndroidRuntime:E '*:S' | tee /tmp/crash.log
            test ! -s /tmp/crash.log || { echo "the sample crashed on the emulator"; exit 1; }
