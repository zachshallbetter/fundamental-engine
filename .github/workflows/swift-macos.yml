name: swift-macos

# Clean-builds the Apple-only Swift targets on every swift/** change (#512). swift-linux.yml only
# exercises the portable core (FundamentalCore + FundamentalPlatform) — the Apple hosts are excluded
# there by Package.swift's `#if os(Linux)`. So nothing compiled the RealityKit / AppKit / Metal hosts
# in PR CI, and the #502 RealityFieldHost break stayed latent until a release tried to build it. This
# job is that missing gate: a fresh macOS runner builds the whole Apple stack from scratch.
#
# Coverage note: on macOS, `canImport(UIKit)` is false, so the iOS-only UIKitFieldHost is skipped here.
# RealityKit + AppKit + Metal + SwiftUI + FieldLab all build. An iOS leg for the UIKit host
# (`xcodebuild -destination 'generic/platform=iOS Simulator'`) is a deliberate follow-up — kept out of
# this first cut so the gate is reliably green before adding a destination-specific build.

on:
  push:
    branches: [main]
    paths: ['swift/**', '.github/workflows/swift-macos.yml']
  pull_request:
    paths: ['swift/**', '.github/workflows/swift-macos.yml']

jobs:
  apple:
    name: build + test (macOS — Apple targets)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # The tests use swift-testing (`import Testing`), which ships with Swift 6 / Xcode 16 — matching
      # the Linux job's swift:6.0 toolchain. macos-14's *default* Xcode is 15.x (Swift 5.10, no Testing
      # module), so pin the newest stable Xcode explicitly or `swift test` fails with "no such module".
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: swift version
        working-directory: swift
        run: swift --version
      - name: swift build (release — all Apple targets, clean)
        working-directory: swift
        # builds FundamentalCore/Platform/Vanilla (RealityKit·AppKit·Metal hosts)/SwiftUI + FieldLab.
        run: swift build -c release
      - name: swift test
        working-directory: swift
        run: swift test
