name: Refresh example snapshots

# The invisible-fields examples ship committed real-data snapshots (the SSR baseline and
# no-JS truth; pages upgrade themselves to live data in the browser). This keeps the
# baselines from going stale: re-run the snapshot script weekly and open a PR when the
# data moved. Manual runs via workflow_dispatch.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC — off the top of the hour, off API rush
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # plain node + fetch — the script has no dependencies
      - name: Refresh snapshots
        run: node apps/site/scripts/snapshot-examples.mjs

      - name: Open a PR when the data moved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- apps/site/src/data/examples; then
            echo "snapshots unchanged — nothing to do"
            exit 0
          fi
          branch="chore/snapshot-refresh-$(date -u +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add apps/site/src/data/examples
          git commit -m "chore(site): weekly example-snapshot refresh"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(site): weekly example-snapshot refresh" \
            --body "Automated weekly refresh of the invisible-fields example snapshots (\`apps/site/scripts/snapshot-examples.mjs\`). The committed snapshots are each page's SSR baseline and no-JS truth — this keeps them honest. CI runs the full gate on this PR." \
            --base main \
            --head "$branch"
