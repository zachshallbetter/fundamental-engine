# When a PR is opened, re-opened, or its base changes, try to keep it up-to-date with main.
# This prevents the merge-queue "BEHIND" / "BLOCKED" cycle that stalls parallel agent PRs.
name: auto-update-branch

on:
  push:
    branches: [main]

jobs:
  update-open-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update stale PR branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all open PRs targeting main that are behind
          prs=$(gh pr list --base main --state open --json number,mergeStateStatus \
                  --jq '.[] | select(.mergeStateStatus=="BEHIND" or .mergeStateStatus=="DIRTY") | .number')
          for pr in $prs; do
            echo "Updating PR #$pr"
            gh pr update-branch "$pr" || echo "  ↳ skipped (conflict or already current)"
          done
