name: E2E

on:
  pull_request:
    branches: [main]
    paths: ["apps/site/**", "packages/**"]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: playwright · invisible fields
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # chromium carries the desktop suite AND the mobile (Pixel 7 emulation) project;
      # webkit carries the desktop suite — the sparkline regression this suite exists to
      # prevent was WebKit-specific, so chromium-only coverage could never catch its class.
      - name: Install Playwright browsers
        run: pnpm --filter @field-ui/site exec playwright install --with-deps chromium webkit

      # `pnpm -r build` builds the packages in topological order (the site's workspace deps
      # resolve from their dist) and then the Astro site itself — the e2e suite runs against
      # the built dist via `astro preview` (see apps/site/playwright.config.ts).
      - name: Build (packages + site)
        run: pnpm build

      # all three projects share the one preview webServer: chromium + webkit run the
      # full desktop suite, mobile runs only e2e/mobile.spec.ts (its testMatch).
      - name: E2E
        run: pnpm --filter @field-ui/site test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/site/playwright-report
          retention-days: 7
