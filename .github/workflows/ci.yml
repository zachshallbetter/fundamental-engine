name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first: `tsc` builds the packages in topological order, which typechecks
      # every package AND emits the core's `dist` types that the adapters resolve. A
      # standalone `typecheck` before the build can't find the not-yet-built core types.
      - name: Build (typechecks all packages)
        run: pnpm build

      - name: Test
        run: pnpm test

      # Verify each publishable package's entry points resolve to built files and import
      # cleanly — catches exports-map / `files` mistakes before they reach npm.
      - name: Smoke-check dist
        run: pnpm check:dist
