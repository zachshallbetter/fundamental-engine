name: CI

# The always-on gate: every push to main and every PR runs the full verification gate
# plus the e2e matrix, and a mandatory `conclusion` job asserts every dependency
# SUCCEEDED — a skipped or cancelled job can never count as green. `conclusion` is the
# required status check on main's branch protection; the same gate re-runs in
# release.yml before any publish (see RELEASING.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  gate:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # never expose the token to later steps

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first: `tsc` builds the packages in topological order, which typechecks
      # every package AND emits the core's `dist` types that the adapters resolve. A
      # standalone `typecheck` before the build can't find the not-yet-built core types.
      - name: Build (typechecks all packages)
        run: pnpm build

      - name: Test
        run: pnpm test

      # Entry-point file existence + live import for every published package. Catches
      # build-output / exports-map / `files` mistakes that the type system can't see.
      - name: Smoke-check dist
        run: pnpm check:dist

      # publint (exports-map / types conditions) + attw (TypeScript resolution under all
      # module/bundler conditions). Distinct from the smoke check above: check:dist verifies
      # the files are present and importable; check:packaging verifies the packaging metadata
      # declares them correctly and types resolve under every resolution algorithm.
      - name: Check packaging (publint + attw)
        run: pnpm check:packaging

      # Lock the frozen 0.x public API surface: every stable value/type still exported with the
      # right kind (typechecked) and every stable element/attribute contract intact. A break here
      # means the public contract changed — see docs/canonical/api-stability.md.
      - name: Check API surface
        run: pnpm check:api

      # Keep the READMEs living: each package README names its real package, the root README's
      # catalog counts match the catalog, and no README uses the wrong core package name.
      - name: Check READMEs
        run: pnpm check:readme

      # data/recipes.json is generated from the catalog source (pnpm gen:recipes); fail if it drifted.
      - name: Check recipes datafile
        run: pnpm check:recipes

      # packages/elements/custom-elements.json is generated from the element source (pnpm gen:cem);
      # fail if the committed manifest drifted from the annotated <field-root>/<field-cell> classes.
      - name: Check custom-elements manifest
        run: pnpm check:cem

      # the cross-plane conformance golden (Swift parity, #526) is emitted from the JS engine
      # (pnpm gen:golden); fail if the committed golden drifted from the current JS force math, so the
      # Swift GoldenConformanceTests can't validate against a stale fixture. The Swift side of the gate
      # (Swift force == golden) runs in swift-macos.yml / swift-linux.yml.
      - name: Check cross-plane conformance golden
        run: pnpm check:golden

  e2e:
    name: "e2e · ${{ matrix.project }}"
    runs-on: ubuntu-latest
    needs: gate
    strategy:
      fail-fast: false # report every browser's failure, not just the first
      matrix:
        project: [chromium, webkit, mobile]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # the `mobile` project is Pixel 7 emulation — it runs on the chromium engine.
      - name: Install Playwright browser
        run: pnpm --filter @fundamental-engine/site exec playwright install --with-deps ${{ matrix.project == 'webkit' && 'webkit' || 'chromium' }}

      # `pnpm build` builds the packages in topological order (the site's workspace deps
      # resolve from their dist) and then the Astro site itself — the e2e suite runs against
      # the built dist via `astro preview` (see apps/site/playwright.config.ts).
      - name: Build (packages + site)
        run: pnpm build

      - name: E2E
        run: pnpm --filter @fundamental-engine/site test:e2e --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: apps/site/playwright-report
          retention-days: 7

  # The required status check. Runs even when a dependency fails (never when the whole run
  # is cancelled), and passes only if EVERY dependency result is "success" — GitHub would
  # otherwise count a skipped job as a satisfied requirement.
  conclusion:
    name: conclusion
    needs: [gate, e2e]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: All jobs succeeded
        run: |
          jq -C <<< '${{ toJson(needs) }}'
          jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
