<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fundamental — single-file (standalone IIFE)</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        background: #0b0d12;
        color: #e8edf5;
        min-height: 100vh;
      }
      #field {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      main {
        position: relative;
        z-index: 1;
        max-width: 40rem;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }
      h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 1rem; }
      .card {
        display: block;
        margin: 1.5rem 0;
        padding: 1.25rem 1.5rem;
        border: 1px solid #2a3140;
        border-radius: 12px;
        background: rgba(20, 24, 33, 0.6);
      }
      code { color: #9ad0ff; }
    </style>
  </head>
  <body>
    <canvas id="field"></canvas>

    <main>
      <h1 data-body="gravity:1.4">No bundler. No import map.</h1>
      <p>
        This page loads the pre-bundled single-file build
        (<code>standalone.global.js</code>) with a classic
        <code>&lt;script&gt;</code> tag. It exposes one global:
        <code>Fundamental</code>. Drop the file next to your HTML and you're
        done.
      </p>

      <article class="card" data-body="attract:1.0">A body that attracts.</article>
      <article class="card" data-body="charge:-0.8">A body with negative charge.</article>
    </main>

    <!-- The #585 single-file IIFE: defines `window.Fundamental`, no modules. -->
    <script src="./standalone.global.js"></script>
    <script>
      // Fundamental.createField(canvas, opts) — same API as the ESM entry.
      var field = Fundamental.createField(document.getElementById("field"), {
        render: "dots",
        accent: "#4da3ff",
      });
      window.__field = field;
    </script>
  </body>
</html>
