<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fundamental — web component (&lt;field-root&gt;)</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        background: #0b0d12;
        color: #e8edf5;
        min-height: 100vh;
      }
      /* <field-root> mounts its own full-viewport canvas behind the page. */
      main {
        position: relative;
        z-index: 1;
        max-width: 40rem;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }
      h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 1rem; }
      .card {
        display: block;
        margin: 1.5rem 0;
        padding: 1.25rem 1.5rem;
        border: 1px solid #2a3140;
        border-radius: 12px;
        background: rgba(20, 24, 33, 0.6);
      }
      code { color: #9ad0ff; }
    </style>
  </head>
  <body>
    <!--
      Drop <field-root> once on the page: it becomes the singleton page field and
      scans the document for [data-body] elements. render="dots" draws the
      particle surface (the default is "none" — signals-only).
    -->
    <field-root render="dots" accent="#4da3ff"></field-root>

    <main>
      <h1 data-body="gravity:1.4">The web-component path</h1>
      <p>
        No imperative JS at all — just an HTML tag. The
        <code>&lt;field-root&gt;</code> custom element comes from
        <code>@fundamental-engine/elements</code>, loaded over a CDN. Everything
        with <code>data-body</code> becomes a body in the field.
      </p>

      <article class="card" data-body="attract:1.0">A body that attracts.</article>
      <article class="card" data-body="charge:+0.8">A body with positive charge.</article>
      <a class="card" href="#" data-body="gravity:1.0">A link with mass.</a>
    </main>

    <!-- Importing the module registers <field-root> as a custom element. -->
    <script type="module">
      import "https://esm.sh/@fundamental-engine/elements@0.9.0";
    </script>
  </body>
</html>
