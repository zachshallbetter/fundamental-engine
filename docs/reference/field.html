<!DOCTYPE html>
<html lang="en" style="background:#04050a">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#04050a" />
<title>The Field — Zach Shallbetter</title>
<meta name="description" content="A sandbox for the reciprocal field. Drop bodies, switch formations, watch the system respond." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Martian+Mono:wght@300..700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="lab.css" />
<style>
  body.lab { cursor: crosshair; }
  .lab-head { position: fixed; z-index: 55; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 1.4rem var(--gut); padding-top: calc(1.4rem + env(safe-area-inset-top)); pointer-events: none; }
  .lab-head a, .lab-head .lab-title { pointer-events: auto; }
  .lab-title { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-3); }
  .lab-back { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); transition: color .2s; }
  .lab-back:hover { color: var(--text); }
  .lab-hint { position: fixed; z-index: 55; left: 50%; top: 42%; transform: translateX(-50%); text-align: center; pointer-events: none; transition: opacity .6s ease; }
  .lab-hint h1 { margin: 0 0 0.8rem; font-size: clamp(2rem, 6vw, 4.5rem); font-weight: 700; letter-spacing: -0.04em; }
  .lab-hint p { margin: 0; font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.08em; color: var(--text-3); }
  @media (hover: none) { body.lab { cursor: auto; } }
  @media (max-width: 720px) {
    .lab-hint h1 { font-size: clamp(1.6rem, 8vw, 2.6rem); }
    .lab-hint p { font-size: 0.7rem; padding: 0 1.2rem; }
  }
</style>
</head>
<body class="lab">
<canvas id="field"></canvas>
<div class="scrim"></div>

<div class="lab-head">
  <span class="lab-title">The Field — sandbox</span>
  <a class="lab-back" href="index.html">← Back</a>
</div>

<div class="lab-hint" id="labHint">
  <h1>Make the field yours.</h1>
  <p>Click anywhere to drop a body · drag to move · tap ✕ to remove</p>
</div>

<div id="nodes"></div>

<div class="lab-bar" id="labBar">
  <div class="lab-body" id="labBody">
    <div class="lab-status" id="labStatus">
      <span class="ls-dot" id="lsDot"></span>
      <span class="ls-text" id="lsText"></span>
      <span class="ls-field" id="lsField"></span>
    </div>
    <div class="lab-section">
      <span class="lab-label">Only when</span>
      <div class="seg cond" id="conds">
        <button class="on" data-cond="">Always</button>
        <button data-cond="fast">Fast</button>
        <button data-cond="hot">Hot</button>
      </div>
    </div>
    <div class="lab-section">
      <span class="lab-label">Formation</span>
      <div class="seg form" id="forms">
        <button class="on" data-form="ambient">Ambient</button>
        <button data-form="wells">Wells</button>
        <button data-form="lanes">Lanes</button>
        <button data-form="scatter">Scatter</button>
        <button data-form="accretion">Accretion</button>
      </div>
    </div>
    <div class="lab-actions">
      <button class="lab-btn" id="shareBtn">Share field</button>
      <button class="lab-btn" id="clearBtn">Clear all</button>
    </div>
  </div>
  <div class="lab-rail">
    <span class="rail-active"><i class="g g-attract" id="handleGlyph"></i><span class="rail-name" id="handleName">Attract</span></span>
    <span class="rail-div"></span>
    <div class="brushes" id="tools">
      <button class="brush on" data-tool="attract" style="--fc:#4da3ff" title="Attract — pulls matter into a well" aria-label="Attract"><i class="g g-attract"></i></button>
      <button class="brush" data-tool="repel" style="--fc:#ff9d5c" title="Repel — pushes matter away" aria-label="Repel"><i class="g g-repel"></i></button>
      <button class="brush" data-tool="absorb" style="--fc:#ff6e9c" title="Absorb — swallows matter, then pops" aria-label="Absorb"><i class="g g-absorb"></i></button>
      <button class="brush" data-tool="vortex" style="--fc:#2dd4bf" title="Vortex — spins matter into a whirlpool" aria-label="Vortex"><i class="g g-vortex"></i></button>
      <button class="brush" data-tool="stream" style="--fc:#7dd3fc" title="Stream — blows a directional current" aria-label="Stream"><i class="g g-stream"></i></button>
      <button class="brush" data-tool="drag" style="--fc:#8da2c0" title="Drag — thickens the medium" aria-label="Drag"><i class="g g-drag"></i></button>
      <button class="brush" data-tool="spring" style="--fc:#86e57f" title="Spring — tethers matter to a radius" aria-label="Spring"><i class="g g-spring"></i></button>
      <button class="brush" data-tool="emitter" style="--fc:#a78bfa" title="Emitter — draws matter in and jets it out" aria-label="Emitter"><i class="g g-emitter"></i></button>
    </div>
    <span class="rail-div"></span>
    <button class="lab-expand" id="labHandle" type="button" aria-expanded="false" aria-controls="labBody" title="More options"><span class="lab-chevron"></span></button>
  </div>
</div>

<div id="tweaks-root"></div>

<script src="forces.js"></script>
<script src="field.js"></script>
<script src="lab.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks-app.jsx"></script>
</body>
</html>
